name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m compileall app
      - run: pytest -q --ignore=tests/test_integration_stack.py
      - run: alembic upgrade head --sql > /tmp/mini_foundry_migration.sql

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: test -s lib/api/generated/schema.ts
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - run: python -m pip install --upgrade pip pip-audit
      - run: pip-audit -r backend/requirements.txt
      - run: npm audit --prefix frontend --audit-level=high
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: docker compose up -d --build postgres redis minio minio-init migrate backend
      - run: |
          for i in $(seq 1 60); do
            curl -fsS http://localhost:8000/health && exit 0
            sleep 2
          done
          docker compose logs backend migrate
          exit 1
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - run: npm run api:generate
        working-directory: frontend
        env:
          OPENAPI_URL: http://127.0.0.1:8000/openapi.json
      - run: git diff --exit-code lib/api/generated/schema.ts
        working-directory: frontend
      - run: docker compose up -d --build frontend
      - run: |
          for service in backend frontend; do
            image_id="$(docker compose images -q "$service")"
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image \
              --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed "$image_id"
          done
      - run: curl -fsS http://localhost:3000 >/tmp/mini-foundry-home.html
      - if: always()
        run: docker compose down -v --remove-orphans
